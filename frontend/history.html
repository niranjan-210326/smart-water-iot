<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Usage History</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="page-container">
        <section class="card history-card">
            <header class="dashboard-header">
                <h1>Motor Usage History</h1>
                <div class="header-actions">
                    <span id="historyConnectionStatus" class="status-chip status-ok">Connected</span>
                    <button id="backToDashboardBtn" class="btn btn-secondary" type="button">Back to Dashboard</button>
                </div>
            </header>

            <section class="panel">
                <h2>Summary</h2>
                <p class="reading" id="historySummary">Total runs: 0 | Total duration: 0 sec | Total power: 0.0</p>
                <p class="error" id="historyError"></p>
            </section>

            <section class="panel">
                <h2>Log Records</h2>
                <div class="table-wrap">
                    <table class="logs-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Start</th>
                                <th>End</th>
                                <th>Duration (s)</th>
                                <th>Power</th>
                                <th>Fault</th>
                            </tr>
                        </thead>
                        <tbody id="logsTableBody"></tbody>
                    </table>
                </div>
                <p id="logsEmptyState" class="hint">Loading records...</p>
            </section>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
